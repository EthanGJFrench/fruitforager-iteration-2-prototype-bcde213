<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="icon" type="image/x-icon" href="./assets/svgs/apple-svgrepo-com.svg">
    <title>Interactive Map | FruitForager</title>
</head>
<body class="bg-light">
    <!-- Fixed header -->
    <div class="fixed-top">
        <!-- Navigation bar -->
        <section class="navbar-expand-md p-0 navbar border-1 border-bottom border-dark bg-light">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="./index.html">
                    <img src="assets/svgs/apple-svgrepo-com.svg" alt="FruitForager logo"> <!-- Temp Logo -->
                    <h1 class="m-0">FruitForager</h1>
                </a>
                <button class="navbar-toggler bg-primary bg-gradient border border-dark" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div  id="navbarNav" class="collapse navbar-collapse">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link px-2 py-3" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active px-2 py-3" href="map.html">Interactive Map</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-2 py-3" data-bs-toggle="modal" data-bs-target="#tutorialVideoModal">Tutorial Video</a>
                        </li>
                    </ul>
                </div>
            </div>
        </section>
        <!-- Tree select element -->
        <form id="treeFilterForm" class="dropdown container p-3 w-100">
            <!-- Tree select button -->
            <button id="treeFilterDropdownBtn" class="btn btn-primary bg-gradient dropdown-toggle d-flex align-items-center border border-dark" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false">
                <h3 class="m-0">Filter Fruit Trees</h3>
            </button>
            <!-- Dropdown menu -->
            <div class="dropdown-menu">
                <!-- Select/deselect all -->
                <div class="ff-form-check">
                    <input id="selectAllTreesCheck" class="form-check-input" type="checkbox">
                    <label for="selectAllTreesCheck">Select All</label>
                </div>
                <!-- Select tree options -->
                <div class="ps-4">
                    <div class="ff-form-check">
                        <input id="appleCheck" class="form-check-input ff-fruit-option-check" name="fruit" type="checkbox" value="apple">
                        <label for="appleCheck">Apple</label>
                    </div>
                    <div class="ff-form-check">
                        <input id="apricotCheck" class="form-check-input ff-fruit-option-check" name="fruit" type="checkbox" value="apricot">
                        <label for="apricotCheck">Apricot</label>
                    </div>
                    <div class="ff-form-check">
                        <input id="crabAppleCheck" class="form-check-input ff-fruit-option-check" name="fruit" type="checkbox" value="crabApple">
                        <label for="crabAppleCheck">Crab Apple</label>
                    </div>
                    <div class="ff-form-check">
                        <input id="chestnutCheck" class="form-check-input ff-fruit-option-check" name="fruit" type="checkbox" value="chestnut">
                        <label for="chestnutCheck">Chestnut</label>
                    </div>
                    <div class="ff-form-check">
                        <input id="cherryCheck" class="form-check-input ff-fruit-option-check" name="fruit" type="checkbox" value="cherry">
                        <label for="cherryCheck">Cherry</label>
                    </div>
                    
                    <div class="ff-form-check">
                        <input id="oliveCheck" class="form-check-input ff-fruit-option-check" name="fruit" type="checkbox" value="olive">
                        <label for="oliveCheck">Olive</label>
                    </div>
                    <div class="ff-form-check">
                        <input id="peachCheck" class="form-check-input ff-fruit-option-check" name="fruit" type="checkbox" value="peach">
                        <label for="peachCheck">Peach</label>
                    </div>
                    <div class="ff-form-check">
                        <input id="pearCheck" class="form-check-input ff-fruit-option-check" name="fruit" type="checkbox" value="pear">
                        <label for="pearCheck">Pear</label>
                    </div>
                    <div class="ff-form-check">
                        <input id="plumCheck" class="form-check-input ff-fruit-option-check" name="fruit" type="checkbox" value="plum">
                        <label for="plumCheck">Plum</label>
                    </div>
                </div>
                <!-- Submit button -->
                <div class="sticky-bottom p-3 bg-light ff-submit-container">
                    <button id="submitFruitFilter" type="reset" class="btn btn-secondary bg-gradient w-100 border border-dark">
                        <h3 class="m-0">Reset Filter</h3>
                    </button>
                </div>
            </div>
        </form>
    </div>

    <!-- Tutorial video modal -->
    <section class="modal fade bg-gradient" id="tutorialVideoModal" tabindex="-1" aria-labelledby="tutorialVideoModal" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-primary bg-gradient">
                <div class="modal-header border-0">
                    <h1>Video Tutorial</h1>
                    <button type="button" class="btn-close border-0" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <video class="w-100" controls>
                        <source src="assets/video/8745407-hd_2048_1080_30fps.mp4"> <!-- Temorary video -->
                    </video>
                </div>
            </div>
        </div>
    </section>

    <!-- Interactive map -->
    <div id="map"></div>
    <!-- Custom JS import -->
    <script type=module src="scripts/main.js"></script>
    <!-- Bootstrap import -->
    <script src="assets/bootstrap/bootstrap.bundle.min.js"></script> <!-- This is required because git repo ignore node modules -->
</body>
</html>
