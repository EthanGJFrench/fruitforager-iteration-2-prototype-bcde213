<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <title>Interactive Map | FruitForager</title>
</head>
<body class="bg-light">
    <!-- Fixed header -->
    <div class="fixed-top">
        <!-- Navigation bar -->
        <section class="navbar-expand-md p-0 navbar border-1 border-bottom border-dark bg-light">
            <div class="container">
                <a class="navbar-brand ms-2 d-flex align-items-center" href="./index.html">
                    <img src="assets/svgs/apple-svgrepo-com.svg" alt="FruitForager logo"> <!-- Temp Logo -->
                    <h1 class="m-0">FruitForager</h1>
                </a>
                <button class="navbar-toggler bg-primary bg-gradient border border-dark" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link px-2 py-3" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active px-2 py-3" href="map.html">Interactive Map</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-2 py-3" data-bs-toggle="modal" data-bs-target="#tutorialVideoModal">Tutorial Video</a>
                        </li>
                    </ul>
                </div>
            </div>
        </section>
        <!-- Tree select -->
        <form id="treeFilterForm" class="dropdown container p-3 w-100">
            <!-- Select element -->
            <button class="btn btn-primary bg-gradient dropdown-toggle d-flex align-items-center border border-dark" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <h3 class="m-0">Filter Fruit Trees</h3>
            </button>
            <!-- Dropdown menu -->
            <div class="dropdown-menu p-3">
                <!-- Select/deselect all -->
                <div id="selectAllTreesCheck" class="form-check">
                    <input class="form-check-input" type="checkbox" value="all" id="selectAllCheck">
                    <label class="form-check-label" for="selectAllCheck">Select All</label>
                </div>
                <!-- Select tree options -->
                <div class="ps-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="apple" id="appleCheck">
                        <label class="form-check-label" for="appleCheck">Apple</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="apricot" id="apricotCheck">
                        <label class="form-check-label" for="apricotCheck">Apricot</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="almond" id="almondCheck">
                        <label class="form-check-label" for="almondCheck">Almond</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="crabApple" id="crabAppleCheck">
                        <label class="form-check-label" for="crabAppleCheck">Crab Apples</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="chestnut" id="chestnutCheck">
                        <label class="form-check-label" for="chestnutCheck">Chestnut</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="cherry" id="cherryCheck">
                        <label class="form-check-label" for="cherryCheck">Cherry</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="european beech" id="europeanBeechCheck">
                        <label class="form-check-label" for="europeanBeechCheck">European Beech</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="elderberry" id="elderberryCheck">
                        <label class="form-check-label" for="elderberryCheck">Elderberry</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="honeyLocust" id="honeyLocustCheck">
                        <label class="form-check-label" for="honeyLocustCheck">Honey Locust</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="loquat" id="loquatCheck">
                        <label class="form-check-label" for="loquatCheck">Loquat</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="olive" id="oliveCheck">
                        <label class="form-check-label" for="oliveCheck">Olive</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="peach" id="peachCheck">
                        <label class="form-check-label" for="peachCheck">Peach</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="pear" id="pearCheck">
                        <label class="form-check-label" for="pearCheck">Pear</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="plum" id="plumCheck">
                        <label class="form-check-label" for="plumCheck">Plum</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="quince" id="quinceCheck">
                        <label class="form-check-label" for="quinceCheck">Quince</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="walnut" id="walnutCheck">
                        <label class="form-check-label" for="walnutCheck">Walnut</label>
                    </div>
                </div>
                <!-- Submit button -->
                <button type="submit" class="btn btn-secondary bg-gradient w-100 border border-dark sticky-bottom">
                    <h3 class="m-0">Apply Filter</h3>
                </button>
            </div>
        </form>
    </div>

    <!-- Tutorial video modal -->
    <section class="modal fade bg-gradient" id="tutorialVideoModal" tabindex="-1" aria-labelledby="tutorialVideoModal" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-primary bg-gradient">
                <div class="modal-header border-0">
                    <h1>Video Tutorial</h1>
                    <button type="button" class="btn-close border-0" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <video class="w-100" controls>
                        <source src="assets/video/8745407-hd_2048_1080_30fps.mp4"> <!-- Temorary video -->
                    </video>
                </div>
            </div>
        </div>
    </section>

    <!-- Interactive map -->
    <div id="map"></div>
    <!-- Map script import -->
    <script src="scripts/map.js"></script>
    <!-- Bootstrap import -->
    <script src="assets/bootstrap/bootstrap.bundle.min.js"></script> <!-- This is required because git repo ignore node modules -->
</body>
</html>
