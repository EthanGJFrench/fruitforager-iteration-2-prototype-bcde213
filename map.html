<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <title>Interactive Map | FruitForager</title>
</head>
<body class="bg-light">
    <!-- Navigation bar -->
    <div class="fixed-top">
        <section class="navbar-expand-md p-0 navbar border-1 border-bottom border-dark bg-light">
            <div class="container">
                <a class="navbar-brand ms-2 d-flex align-items-center" href="./index.html">
                    <img src="assets/svgs/apple-svgrepo-com.svg" alt="FruitForager logo"> <!-- Temp Logo -->
                    <h1 class="m-0">FruitForager</h1>
                </a>
                <button class="navbar-toggler bg-primary bg-gradient" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link px-2 py-3" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active px-2 py-3" href="map.html">Interactive Map</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-2 py-3" data-bs-toggle="modal" data-bs-target="#tutorialVideoModal">Tutorial Video</a>
                        </li>
                    </ul>
                </div>
            </div>
        </section>
        <!-- Tree select -->
        <form id="treeFilterForm" class="dropdown container p-3">
            <button class="btn btn-primary bg-gradient dropdown-toggle w-100" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                Filter Fruit Trees
            </button>
            <div class="dropdown-menu p-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="apple" id="appleCheck">
                    <label class="form-check-label" for="appleCheck">Apple</label>
                </div> 
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="apricot" id="apricotCheck">
                    <label class="form-check-label" for="apricotCheck">Apricot</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="almond" id="almondCheck">
                    <label class="form-check-label" for="almondCheck">Almond</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="crabApple" id="crabAppleCheck">
                    <label class="form-check-label" for="crabAppleCheck">Crab Apples</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="chestnut" id="chestnutCheck">
                    <label class="form-check-label" for="chestnutCheck">Chestnut</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="cherry" id="cherryCheck">
                    <label class="form-check-label" for="cherryCheck">Cherry</label>
                </div>
                <button type="submit" class="btn btn-secondary w-100">
                    Apply Filters
                </button>
            </div>
        </form>
    </div>

    <!-- Tutorial video modal -->
    <section class="modal fade bg-gradient" id="tutorialVideoModal" tabindex="-1" aria-labelledby="tutorialVideoModal" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-primary bg-gradient">
                <div class="modal-header border-0">
                    <h1>Video Tutorial</h1>
                    <button type="button" class="btn-close border-0" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <video class="w-100" controls>
                        <source src="assets/video/8745407-hd_2048_1080_30fps.mp4"> <!-- Temorary video -->
                    </video>
                </div>
            </div>
        </div>
    </section>

    <!-- Interactive map -->
    <div id="map"></div>
    <!-- Map script import -->
    <script src="scripts/map.js"></script>
    <!-- Bootstrap import -->
    <script src="assets/bootstrap/bootstrap.bundle.min.js"></script> <!-- This is required because git repo ignore node modules -->
</body>
</html>
